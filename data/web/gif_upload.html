<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Upload GIF</title>
  <link rel="stylesheet" href="./css/bootstrap.min.css"/>
  <link rel="stylesheet" href="./css/style.css"/>
  <script src="./js/bootstrap.bundle.min.js"></script>
  <script src="./js/alpinejs.min.js" defer></script>
  <script src="./js/utils.js"></script>
  <script src="./js/themeSwitcher.js"></script>
  <script src="./js/gifUploadHandler.js"></script>
  <script src="./js/main.js"></script>
</head>
<body class="d-flex flex-column min-vh-100">
  <header id="header-placeholder"></header>

  <main class="container py-4 flex-grow-1">
    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="./index.html">Home</a></li>
        <li class="breadcrumb-item active">Upload GIF</li>
      </ol>
    </nav>

    <div class="row g-4" x-data="gifUploadHandler()">

      <div class="col-12 col-md-5">
        <div class="card shadow-sm">
          <div class="card-header fw-semibold">🎞️ Upload GIF</div>
          <div class="card-body">
            <form @submit.prevent="uploadGif">
              <div class="mb-3">
                <input type="file" class="form-control" x-ref="fileInput" required accept="image/gif"/>
              </div>
              <button type="submit" class="btn btn-primary" :disabled="uploading">
                <span x-show="uploading" class="spinner-border spinner-border-sm me-1"></span>
                Upload
              </button>
            </form>
            <div x-show="uploadMessage" class="mt-3 alert alert-info" x-text="uploadMessage"></div>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-7">
        <div class="card shadow-sm">
          <div class="card-header d-flex align-items-center gap-2">
            <span class="fw-semibold">GIFs on Device</span>
            <button class="btn btn-sm btn-outline-secondary ms-auto" @click="stopGif()">Stop Playback</button>
          </div>
          <div class="card-body">
            <div x-show="gifListLoaded">
              <p class="text-body-secondary small mb-3">
                Used: <strong x-text="usedBytesHR"></strong> /
                Total: <strong x-text="totalBytesHR"></strong>
                (Free: <strong x-text="freeBytesHR"></strong>)
              </p>
              <template x-if="gifs.length === 0">
                <p class="text-muted"><em>No GIFs uploaded yet.</em></p>
              </template>
              <ul class="list-group list-group-flush">
                <template x-for="gif in gifs" :key="gif.name">
                  <li class="list-group-item d-flex align-items-center gap-2 px-0">
                    <span class="flex-grow-1">
                      <span x-text="gif.name"></span>
                      <small class="text-muted ms-1" x-text="'(' + humanFileSize(gif.size) + ')'"></small>
                    </span>
                    <button class="btn btn-sm btn-outline-primary" @click="playGifFullscreen(gif.name)">Play</button>
                    <button class="btn btn-sm btn-outline-danger" @click="deleteGif(gif.name)">Delete</button>
                  </li>
                </template>
              </ul>
            </div>
            <div x-show="!gifListLoaded">
              <span class="spinner-border spinner-border-sm me-1"></span>
              <em>Loading GIF list...</em>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer id="footer-placeholder"></footer>
</body>
</html>
