<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>API Token</title>
  <link rel="stylesheet" href="./css/bootstrap.min.css"/>
  <link rel="stylesheet" href="./css/style.css"/>
  <script src="./js/bootstrap.bundle.min.js"></script>
  <script src="./js/alpinejs.min.js" defer></script>
  <script src="./js/utils.js"></script>
  <script src="./js/themeSwitcher.js"></script>
  <script src="./js/tokenHandler.js"></script>
  <script src="./js/main.js"></script>
</head>
<body class="d-flex flex-column min-vh-100">
  <header id="header-placeholder"></header>

  <main class="container py-4 flex-grow-1">
    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="./index.html">Home</a></li>
        <li class="breadcrumb-item active">API Token</li>
      </ol>
    </nav>

    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm" x-data="tokenHandler()" x-init="init()">
          <div class="card-header fw-semibold">🔑 Bearer Token</div>
          <div class="card-body">

            <p class="text-body-secondary small">
              This token is stored locally in your browser
              (localStorage key: <strong>Authorization</strong>).
            </p>

            <div class="mb-3">
              <label for="bearer-token" class="form-label fw-semibold">Token</label>
              <div class="input-group">
                <input id="bearer-token" class="form-control" x-model="token"
                       :type="showToken ? 'text' : 'password'"
                       autocomplete="off" placeholder="Paste token here"/>
                <button class="btn btn-outline-secondary" type="button"
                        @click="showToken = !showToken" aria-label="Toggle token visibility">
                  <svg x-show="!showToken" width="18" height="18" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2.5 12c1.8-4 5.5-7 9.5-7 4 0 7.7 3 9.5 7-1.8 4-5.5 7-9.5 7-4 0-7.7-3-9.5-7z"/>
                    <path d="M3 3l18 18"/>
                  </svg>
                  <svg x-show="showToken" width="18" height="18" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
            </div>

            <div class="d-flex gap-2 mb-3">
              <button type="button" class="btn btn-primary" @click="saveToken()" :disabled="loading">Save</button>
              <button type="button" class="btn btn-outline-secondary" @click="clearToken()" :disabled="loading">Clear</button>
            </div>

            <div x-show="statusMsg" class="alert alert-info" x-text="statusMsg"></div>

            <div x-show="hasStoredToken">
              <hr/>
              <h6 class="fw-semibold">Change Token on Device</h6>
              <p class="text-body-secondary small">
                Update the token saved on the device. The current token is used to authorize this change.
              </p>
              <div class="mb-3">
                <label for="new-token" class="form-label">New token</label>
                <div class="input-group">
                  <input id="new-token" class="form-control" x-model="newToken"
                         :type="showNewToken ? 'text' : 'password'"
                         autocomplete="off" placeholder="Paste new token here"/>
                  <button class="btn btn-outline-secondary" type="button"
                          @click="showNewToken = !showNewToken" aria-label="Toggle new token visibility">
                    <svg x-show="!showNewToken" width="18" height="18" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M2.5 12c1.8-4 5.5-7 9.5-7 4 0 7.7 3 9.5 7-1.8 4-5.5 7-9.5 7-4 0-7.7-3-9.5-7z"/>
                      <path d="M3 3l18 18"/>
                    </svg>
                    <svg x-show="showNewToken" width="18" height="18" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                      <circle cx="12" cy="12" r="3"/>
                    </svg>
                  </button>
                </div>
              </div>
              <button type="button" class="btn btn-warning" @click="changeToken()" :disabled="loading">Update Token</button>
              <div x-show="changeStatusMsg" class="mt-2 alert alert-info" x-text="changeStatusMsg"></div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </main>

  <footer id="footer-placeholder"></footer>
</body>
</html>
