<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Firmware / FS Update</title>
  <link rel="stylesheet" href="./css/bootstrap.min.css"/>
  <link rel="stylesheet" href="./css/style.css"/>
  <script src="./js/bootstrap.bundle.min.js"></script>
  <script src="./js/alpinejs.min.js" defer></script>
  <script src="./js/utils.js"></script>
  <script src="./js/themeSwitcher.js"></script>
  <script src="./js/otaUploadHandler.js"></script>
  <script src="./js/main.js"></script>
</head>
<body class="d-flex flex-column min-vh-100">
  <header id="header-placeholder"></header>

  <main class="container py-4 flex-grow-1">
    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="./index.html">Home</a></li>
        <li class="breadcrumb-item active">OTA Update</li>
      </ol>
    </nav>

    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm" x-data="otaUploadHandler()">
          <div class="card-header fw-semibold">⬆️ Update Firmware or Filesystem</div>
          <div class="card-body">

            <form @submit.prevent="uploadFile">
              <div class="mb-3">
                <label class="form-label fw-semibold">Update type</label>
                <select class="form-select" x-model="uploadType">
                  <option value="firmware">Firmware</option>
                  <option value="fs">LittleFS (html/js/css/config)</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Binary file (.bin)</label>
                <input type="file" class="form-control" x-ref="fileInput" required accept=".bin"/>
              </div>
              <button type="submit" class="btn btn-primary" :disabled="uploading">Upload</button>
            </form>

            <template x-if="uploading">
              <div class="mt-3">
                <label class="form-label">Progress</label>
                <div class="progress mb-2">
                  <div class="progress-bar progress-bar-striped progress-bar-animated"
                       :style="'width:' + progress + '%'" x-text="progress + '%'"></div>
                </div>
                <div class="d-flex gap-3 align-items-center">
                  <span x-text="etaText" class="text-muted small"></span>
                  <button @click="cancelUpload" type="button" class="btn btn-sm btn-outline-danger">Cancel</button>
                </div>
              </div>
            </template>

            <div x-show="uploadMessage" class="mt-3 alert alert-info" x-text="uploadMessage"></div>

          </div>
        </div>
      </div>
    </div>
  </main>

  <footer id="footer-placeholder"></footer>
</body>
</html>
